<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olist电商数据分析仪表盘</title>
    <link href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/reset.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #1890ff;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #1890ff;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chart-card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #333;
            font-size: 16px;
        }
        .chart-container {
            width: 100%;
            height: 300px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .tab-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #e8e8e8;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab.active {
            color: #1890ff;
            border-bottom-color: #1890ff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Olist电商数据分析仪表盘</h1>
            <p>基于巴西Olist真实电商数据集的全流程分析</p>
        </div>

        <!-- 关键指标卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">99,441</div>
                <div class="stat-label">总订单数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">R$13,591,643.70</div>
                <div class="stat-label">总销售额</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">99,441</div>
                <div class="stat-label">总用户数</div>
            </div>
        </div>

        <!-- 支付方式分布 -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3>支付方式分布</h3>
                <div id="paymentChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <h3>用户聚类分布</h3>
                <div id="clusterChart" class="chart-container"></div>
            </div>
        </div>

        <!-- 订单趋势 -->
        <div class="chart-card full-width">
            <h3>月度订单趋势</h3>
            <div id="trendChart" class="chart-container" style="height: 400px;"></div>
        </div>

        <!-- 标签页内容 -->
        <div class="tab-container">
            <div class="tabs">
                <div class="tab active" data-tab="userCluster">用户分群分析</div>
                <div class="tab" data-tab="rfm">RFM客户价值分析</div>
                <div class="tab" data-tab="region">地区销量分析</div>
            </div>

            <div class="tab-content active" id="userCluster">
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>各聚类平均消费</h3>
                        <div id="clusterSpendChart" class="chart-container"></div>
                    </div>
                    <div class="chart-card">
                        <h3>各聚类平均订单数</h3>
                        <div id="clusterOrderChart" class="chart-container"></div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="rfm">
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>客户价值分布</h3>
                        <div id="rfmChart" class="chart-container"></div>
                    </div>
                    <div class="chart-card">
                        <h3>各群体平均消费金额</h3>
                        <div id="rfmSpendChart" class="chart-container"></div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="region">
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>地区销量TOP10</h3>
                        <div id="regionChart" class="chart-container"></div>
                    </div>
                    <div class="chart-card">
                        <h3>地区销量趋势</h3>
                        <div id="regionTrendChart" class="chart-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化图表
        document.addEventListener('DOMContentLoaded', function() {
            // 支付方式分布
            const paymentChart = echarts.init(document.getElementById('paymentChart'));
            paymentChart.setOption({
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: {c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    data: ['credit_card', 'boleto', 'voucher', 'debit_card']
                },
                series: [{
                    name: '支付方式',
                    type: 'pie',
                    radius: '60%',
                    data: [
                        {value: 76795, name: 'credit_card'},
                        {value: 19784, name: 'boleto'},
                        {value: 1978, name: 'voucher'},
                        {value: 884, name: 'debit_card'}
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            });

            // 用户聚类分布
            const clusterChart = echarts.init(document.getElementById('clusterChart'));
            clusterChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                xAxis: {
                    type: 'category',
                    data: ['聚类0', '聚类1', '聚类2']
                },
                yAxis: {
                    type: 'value'
                },
                series: [{
                    data: [3396, 95770, 275],
                    type: 'bar',
                    itemStyle: {
                        color: '#1890ff'
                    }
                }]
            });

            // 月度订单趋势
            const trendChart = echarts.init(document.getElementById('trendChart'));
            trendChart.setOption({
                tooltip: {
                    trigger: 'axis'
                },
                xAxis: {
                    type: 'category',
                    data: ['2017-01', '2017-02', '2017-03', '2017-04', '2017-05', '2017-06', '2017-07', '2017-08', '2017-09', '2017-10', '2017-11', '2017-12', '2018-01', '2018-02', '2018-03', '2018-04', '2018-05', '2018-06', '2018-07']
                },
                yAxis: {
                    type: 'value'
                },
                series: [{
                    data: [76, 127, 192, 321, 511, 739, 928, 1337, 1782, 2259, 3514, 4694, 7220, 8957, 11502, 12847, 12780, 9829, 1840],
                    type: 'line',
                    smooth: true,
                    lineStyle: {
                        color: '#1890ff',
                        width: 2
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            {offset: 0, color: 'rgba(24, 144, 255, 0.3)'},
                            {offset: 1, color: 'rgba(24, 144, 255, 0.1)'}
                        ])
                    }
                }]
            });

            // 各聚类平均消费
            const clusterSpendChart = echarts.init(document.getElementById('clusterSpendChart'));
            clusterSpendChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                xAxis: {
                    type: 'category',
                    data: ['聚类0', '聚类1', '聚类2']
                },
                yAxis: {
                    type: 'value',
                    name: '平均消费 (R$)'
                },
                series: [{
                    data: [1032.71, 130.12, 202.35],
                    type: 'bar',
                    itemStyle: {
                        color: '#52c41a'
                    }
                }]
            });

            // 各聚类平均订单数
            const clusterOrderChart = echarts.init(document.getElementById('clusterOrderChart'));
            clusterOrderChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                xAxis: {
                    type: 'category',
                    data: ['聚类0', '聚类1', '聚类2']
                },
                yAxis: {
                    type: 'value',
                    name: '平均订单数'
                },
                series: [{
                    data: [1.15, 1.00, 6.28],
                    type: 'bar',
                    itemStyle: {
                        color: '#fa8c16'
                    }
                }]
            });

            // 客户价值分布
            const rfmChart = echarts.init(document.getElementById('rfmChart'));
            rfmChart.setOption({
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: {c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    data: ['高价值客户', '潜在高价值客户', '一般价值客户', '低价值客户']
                },
                series: [{
                    name: '客户群体',
                    type: 'pie',
                    radius: '60%',
                    data: [
                        {value: 32, name: '高价值客户'},
                        {value: 6843, name: '潜在高价值客户'},
                        {value: 47863, name: '一般价值客户'},
                        {value: 44703, name: '低价值客户'}
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            });

            // 各群体平均消费金额
            const rfmSpendChart = echarts.init(document.getElementById('rfmSpendChart'));
            rfmSpendChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                xAxis: {
                    type: 'category',
                    data: ['高价值客户', '潜在高价值客户', '一般价值客户', '低价值客户'],
                    axisLabel: {
                        rotate: 45
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '平均消费 (R$)'
                },
                series: [{
                    data: [1085.34, 516.83, 126.49, 142.79],
                    type: 'bar',
                    itemStyle: {
                        color: '#722ed1'
                    }
                }]
            });

            // 地区销量TOP10
            const regionChart = echarts.init(document.getElementById('regionChart'));
            regionChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                xAxis: {
                    type: 'category',
                    data: ['SP', 'RJ', 'MG', 'RS', 'PR', 'SC', 'DF', 'ES', 'GO', 'BA'],
                    axisLabel: {
                        rotate: 45
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '销售额 (R$)'
                },
                series: [{
                    data: [6458363.36, 2341632.24, 1370823.36, 692663.03, 685735.44, 420101.34, 314991.64, 284339.44, 227544.61, 210721.21],
                    type: 'bar',
                    itemStyle: {
                        color: '#13c2c2'
                    }
                }]
            });

            // 地区销量趋势
            const regionTrendChart = echarts.init(document.getElementById('regionTrendChart'));
            regionTrendChart.setOption({
                tooltip: {
                    trigger: 'axis'
                },
                legend: {
                    data: ['SP', 'RJ', 'MG']
                },
                xAxis: {
                    type: 'category',
                    data: ['2017-01', '2017-02', '2017-03', '2017-04', '2017-05', '2017-06', '2017-07', '2017-08', '2017-09', '2017-10', '2017-11', '2017-12']
                },
                yAxis: {
                    type: 'value',
                    name: '订单数'
                },
                series: [
                    {
                        name: 'SP',
                        type: 'line',
                        data: [38, 62, 97, 163, 261, 381, 475, 684, 908, 1162, 1818, 2418],
                        smooth: true
                    },
                    {
                        name: 'RJ',
                        type: 'line',
                        data: [14, 23, 34, 58, 85, 133, 167, 236, 312, 387, 623, 814],
                        smooth: true
                    },
                    {
                        name: 'MG',
                        type: 'line',
                        data: [8, 14, 21, 36, 56, 82, 102, 145, 189, 235, 374, 479],
                        smooth: true
                    }
                ]
            });

            // 标签页切换
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    // 移除所有标签的active类
                    tabs.forEach(t => t.classList.remove('active'));
                    // 添加当前标签的active类
                    this.classList.add('active');
                    
                    // 隐藏所有内容
                    const tabContents = document.querySelectorAll('.tab-content');
                    tabContents.forEach(content => content.classList.remove('active'));
                    // 显示当前内容
                    const tabId = this.getAttribute('data-tab');
                    document.getElementById(tabId).classList.add('active');
                });
            });

            // 响应式调整
            window.addEventListener('resize', function() {
                paymentChart.resize();
                clusterChart.resize();
                trendChart.resize();
                clusterSpendChart.resize();
                clusterOrderChart.resize();
                rfmChart.resize();
                rfmSpendChart.resize();
                regionChart.resize();
                regionTrendChart.resize();
            });
        });
    </script>
</body>
</html>
